name: Export Ops Dashboard Data

on:
  schedule:
    - cron: '0 10 * * *'  # 5 AM CDT (UTC-5) = 10:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run export
        env:
          ASPIRE_REPORTING_CLIENT_ID: ${{ secrets.ASPIRE_REPORTING_CLIENT_ID }}
          ASPIRE_REPORTING_SECRET: ${{ secrets.ASPIRE_REPORTING_SECRET }}
          ASPIRE_API_URL: ${{ secrets.ASPIRE_API_URL }}
        run: python scripts/ops-dashboard-export.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          git diff --staged --quiet || git commit -m "Update ops dashboard data $(date -u +%Y-%m-%d)"
          git push

  notify-failure:
    needs: [export]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Send failure email
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 -c "
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

          msg = MIMEMultipart('alternative')
          msg['Subject'] = '[ALERT] Ops Dashboard Export failed'
          msg['From'] = f'Black Hill Assistant <{os.environ[\"GMAIL_EMAIL\"]}>'
          msg['To'] = 'evelin@blackhilltx.com'

          body = '''<h3>Workflow Failure: Ops Dashboard Export</h3>
          <p>The daily ops dashboard export failed.</p>
          <p><a href=\"{}\">View failed run</a></p>
          <p style=\"color:#888;font-size:12px\">Sent by Black Hill automation monitor</p>'''.format(url)

          msg.attach(MIMEText(f'Ops Dashboard Export failed. View: {url}', 'plain'))
          msg.attach(MIMEText(body, 'html'))

          with smtplib.SMTP('smtp.gmail.com', 587) as s:
              s.starttls()
              s.login(os.environ['GMAIL_EMAIL'], os.environ['GMAIL_APP_PASSWORD'])
              s.sendmail(os.environ['GMAIL_EMAIL'], 'evelin@blackhilltx.com', msg.as_string())
          print('Failure alert sent for: Ops Dashboard Export')
          "
