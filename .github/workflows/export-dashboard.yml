name: Export Ops Dashboard Data

on:
  schedule:
    - cron: '0 10 * * *'  # 5 AM CDT (UTC-5) = 10:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run export
        env:
          ASPIRE_REPORTING_CLIENT_ID: ${{ secrets.ASPIRE_REPORTING_CLIENT_ID }}
          ASPIRE_REPORTING_SECRET: ${{ secrets.ASPIRE_REPORTING_SECRET }}
          ASPIRE_API_URL: ${{ secrets.ASPIRE_API_URL }}
        run: python scripts/ops-dashboard-export.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          git diff --staged --quiet || git commit -m "Update ops dashboard data $(date -u +%Y-%m-%d)"
          git push
