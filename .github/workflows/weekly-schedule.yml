name: Weekly Crew Schedule

on:
  schedule:
    - cron: '0 14 * * 0'  # 9 AM CDT (UTC-5) every Sunday
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write  # Needed to commit updated xlsx back to repo

jobs:
  generate-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate schedule and email
        env:
          ASPIRE_REPORTING_CLIENT_ID: ${{ secrets.ASPIRE_REPORTING_CLIENT_ID }}
          ASPIRE_REPORTING_SECRET: ${{ secrets.ASPIRE_REPORTING_SECRET }}
          ASPIRE_API_URL: ${{ secrets.ASPIRE_API_URL }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/weekly-schedule.py

      - name: Commit updated spreadsheet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/crew-schedule.xlsx
          git diff --cached --quiet || git commit -m "Update crew schedule spreadsheet $(date +%Y-%m-%d)"
          git push

  notify-failure:
    needs: [generate-schedule]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Send failure email
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: python
        run: |
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.utils import formataddr

          sender = os.environ['GMAIL_EMAIL']
          url = os.environ['RUN_URL']

          msg = MIMEMultipart('alternative')
          msg['Subject'] = '[ALERT] Weekly Schedule Generator failed'
          msg['From'] = formataddr(('Black Hill Assistant', sender))
          msg['To'] = 'evelin@blackhilltx.com'

          body = f'''<h3>Workflow Failure: Weekly Schedule Generator</h3>
          <p>The Sunday schedule generation failed.</p>
          <p><a href="{url}">View failed run</a></p>
          <p style="color:#888;font-size:12px">Sent by Black Hill automation monitor</p>'''

          msg.attach(MIMEText(body, 'html'))

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(sender, os.environ['GMAIL_APP_PASSWORD'])
              s.sendmail(sender, ['evelin@blackhilltx.com'], msg.as_string())
